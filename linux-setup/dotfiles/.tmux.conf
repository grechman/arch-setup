# ~/.tmux.conf — structure only. Colors come from ~/.config/themes/active/tmux.conf.

# ---- general ----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc,alacritty:Tc,foot*:Tc,ghostty*:Tc"
set -g focus-events off
set -g extended-keys off
set -g mouse on
set -g history-limit 100000
set -g escape-time 10
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g set-titles on
set -g set-titles-string "#S · #W"

# ---- prefix -----------------------------------------------------------------
set -g prefix C-b
bind C-Space send-prefix

# ---- reload -----------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# ---- splits & windows -------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# tabs: Alt+1..9 jump to window, Alt+h/l prev/next
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-h previous-window
bind -n M-l next-window

# rename current window
bind , command-prompt -I "#W" "rename-window '%%'"

# ---- copy mode --------------------------------------------------------------
# Keyboard copy mode only. Press prefix+[ to enter, y to copy, q/Esc to leave.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard 2>/dev/null"

# Mouse wheel scrolls tmux history. Hold Shift for terminal-native selection.
unbind -T root MouseDrag1Pane
bind -T root WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# ---- look & feel base (theme overrides this) -------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 0
set -g window-status-separator ""
set -g pane-border-lines single
set -g monitor-activity on
set -g visual-activity off

# ---- theme (managed by ~/.local/bin/theme-apply) ---------------------------
source-file -q ~/.config/themes/active/tmux.conf
