# Grechman hyprland config
# Ref: https://wiki.hyprland.org/Configuring/

################
### MONITORS ###
################

source = ~/.config/hypr/monitors.conf

#############
### THEME ###
#############
# Comment one line, uncomment another, then SUPER+R (or `theme <name>` in shell)
# to apply across hyprland borders, ghostty, waybar, and tmux.
# source = ~/.config/hypr/themes/rose-pine.conf
# source = ~/.config/hypr/themes/rose-pine-moon.conf
# source = ~/.config/hypr/themes/gruvbox.conf
# source = ~/.config/hypr/themes/kanagawa-wave.conf
source = ~/.config/hypr/themes/kanagawa-dragon.conf
# source = ~/.config/hypr/themes/everforest-dark.conf
# source = ~/.config/hypr/themes/ayu-mirage.conf
# source = ~/.config/hypr/themes/iceberg-dark.conf
# source = ~/.config/hypr/themes/carbonfox.conf

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = nemo
$menu = rofi -show drun -p "Search> "

#################
### AUTOSTART ###
#################

exec-once = hyprlock
exec-once = waybar
exec-once = hyprpaper
exec-once = nm-applet
exec-once = gnome-keyring-daemon --start --components=secrets

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORMTHEME,gtk3

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 0
    # col.active_border / col.inactive_border are set by the active theme
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 7
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        ignore_opacity = false
        passes = 3
        noise = 0.01
        vibrancy = 0.1696
        popups = true
        popups_ignorealpha = 0.2
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    focus_on_activate = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_options = ctrl:nocaps,grp:alt_shift_toggle
}

###################
### KEYBINDINGS ###
###################

# Screenshots
bind = SUPER, S, exec, hyprshot -m region --clipboard-only
bind = SUPER SHIFT, S, exec, hyprshot -m window --clipboard-only

# Waybar reload
bind = SUPER, W, exec, pkill waybar && waybar &

# Screen lock
bind = SUPER SHIFT, L, exec, hyprlock

# Hyprland config + theme reload (re-runs theme-apply on the active theme)
bind = SUPER, R, exec, hyprctl reload

# Move workspace to next monitor
bind = SUPER SHIFT, M, moveworkspacetomonitor, current next

# Apps
bind = SUPER, Q, exec, $terminal
bind = SUPER, C, killactive,
bind = SUPER SHIFT, E, exit,
bind = SUPER, E, exec, $fileManager
bind = SUPER, V, togglefloating,
bind = CTRL ALT, V, exec, /home/grechman/grechman/klim/latex/show-linux.py --source auto
bind = SUPER, D, exec, $menu
bind = SUPER, P, pseudo,
bind = SUPER SHIFT, J, layoutmsg, togglesplit
bind = SUPER, F, fullscreen
bind = SUPER, M, movecurrentworkspacetomonitor, +1

# Focus movement (vim-style)
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Switch workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Mouse window control
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Media
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
 windowrule = no_blur on, match:class com.mitchellh.ghostty #comment out for blur background
windowrule = opacity 0.85 0.85, match:class ^(Nemo|nemo)$
windowrule = border_size 0, match:float no, match:workspace w[tv1]
windowrule = border_size 0, match:float no, match:workspace f[1]
windowrule = rounding 0, match:float no, match:workspace w[tv1]
windowrule = rounding 0, match:float no, match:workspace f[1]
