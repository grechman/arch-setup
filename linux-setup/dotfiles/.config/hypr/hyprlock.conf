# Hyprlock — screen locker config

$font = Monospace

general {
    hide_cursor = false
}

animations {
    enabled = true
    animation = fadeIn, 1, 3, linear
    animation = fadeOut, 1, 3, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    outer_color = rgba(0fffffff)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(ffffffff)
    fade_on_empty = true
    placeholder_text = Input password...
    rounding = 15
    position = 0, -20
    halign = center
    valign = center
    check_color = rgba(00ff99ff)
    fail_color = rgba(ff0000ff)
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 24
    font_family = $font
    position = 0, 120
    halign = center
    valign = center
}
