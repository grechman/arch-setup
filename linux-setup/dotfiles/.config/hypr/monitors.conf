# Monitor configuration
# Run `hyprctl monitors` after first boot into Hyprland to see your monitor name
# Then replace "preferred" and the name below with your actual values
#
# Format: monitor=NAME, RESOLUTION@HZ, POSITION, SCALE
# Example: monitor=DP-1, 1920x1080@60, 0x0, 1
# Auto-detect (safe default):
monitor=,preferred,auto,1
