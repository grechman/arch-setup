# tmux colors ‚Äî everforest dark hard (sage forest)
%hidden BG="#272e33"
%hidden SURFACE="#374145"
%hidden OVERLAY="#414b50"
%hidden FG="#d3c6aa"
%hidden MUTED="#7a8478"
%hidden SUBTLE="#9da9a0"
%hidden ACCENT="#a7c080"
%hidden WARN="#dbbc7f"
%hidden CRIT="#e67e80"

set -g status-style "bg=$BG,fg=$FG"
set -g status-left "#[fg=$ACCENT,bold]‚ñé#[default] "
set -g status-right ""

set -g window-status-format         "#[fg=$MUTED] ‚óã #I #W "
set -g window-status-current-format "#[fg=$ACCENT,bold] ‚óè #I #W "
set -g window-status-activity-style "fg=$WARN"

set -g pane-border-style        "fg=$SURFACE"
set -g pane-active-border-style "fg=$ACCENT"

set -g message-style          "bg=$ACCENT,fg=$BG,bold"
set -g message-command-style  "bg=$SURFACE,fg=$FG"
set -g mode-style             "bg=$ACCENT,fg=$BG"
set -g clock-mode-colour      "$ACCENT"
