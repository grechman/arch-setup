# tmux colors - rose pine moon
%hidden BG="#232136"
%hidden SURFACE="#2a273f"
%hidden OVERLAY="#393552"
%hidden FG="#e0def4"
%hidden MUTED="#6e6a86"
%hidden SUBTLE="#908caa"
%hidden ACCENT="#c4a7e7"
%hidden WARN="#f6c177"
%hidden CRIT="#eb6f92"

set -g status-style "bg=$BG,fg=$FG"
set -g status-left "#[fg=$ACCENT,bold]▎#[default] "
set -g status-right ""

set -g window-status-format         "#[fg=$MUTED] ○ #I #W "
set -g window-status-current-format "#[fg=$ACCENT,bold] ● #I #W "
set -g window-status-activity-style "fg=$WARN"

set -g pane-border-style        "fg=$OVERLAY"
set -g pane-active-border-style "fg=$ACCENT"

set -g message-style          "bg=$ACCENT,fg=$BG,bold"
set -g message-command-style  "bg=$SURFACE,fg=$FG"
set -g mode-style             "bg=$ACCENT,fg=$BG"
set -g clock-mode-colour      "$ACCENT"
