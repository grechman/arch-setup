# tmux colors тАФ ayu mirage (warm cocoa, rust accents)
%hidden BG="#1f2430"
%hidden SURFACE="#1c212b"
%hidden OVERLAY="#2d4054"
%hidden FG="#cbccc6"
%hidden MUTED="#5c6773"
%hidden SUBTLE="#707a8c"
%hidden ACCENT="#ffa759"
%hidden WARN="#ffcc66"
%hidden CRIT="#f28779"

set -g status-style "bg=$BG,fg=$FG"
set -g status-left "#[fg=$ACCENT,bold]тЦО#[default] "
set -g status-right ""

set -g window-status-format         "#[fg=$MUTED] тЧЛ #I #W "
set -g window-status-current-format "#[fg=$ACCENT,bold] тЧП #I #W "
set -g window-status-activity-style "fg=$WARN"

set -g pane-border-style        "fg=$SURFACE"
set -g pane-active-border-style "fg=$ACCENT"

set -g message-style          "bg=$ACCENT,fg=$BG,bold"
set -g message-command-style  "bg=$SURFACE,fg=$FG"
set -g mode-style             "bg=$ACCENT,fg=$BG"
set -g clock-mode-colour      "$ACCENT"
